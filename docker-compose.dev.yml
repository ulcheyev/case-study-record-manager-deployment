# Only for development.
services:

  # Expose gateway on all interfaces for LAN access.
  # Auth is disabled to simplify development.
  nginx:
    ports:
      - "0.0.0.0:${INTERNAL_HOST_PORT:-1235}:80"
    environment:
      NGINX_LOG_LEVEL: "debug"
      OAUTH2_PROXY_AUTH_REQUIRED: "false"

  oauth2-proxy:
    environment:
      OAUTH2_PROXY_LOG_LEVEL: "debug"

  media-asset-annotator-server:
    environment:
      LOGGING_LEVEL_ROOT: "DEBUG"
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB: "TRACE"
      CORS_ALLOWED_ORIGINS: "http://localhost:1235,http://localhost:5173,http://media-asset-annotator,${CORS_ALLOWED_ORIGINS_ANNOTATOR_SERVER:-}"

  record-manager-statistics-server:
    environment:
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB: "TRACE"
      SPRING_ACTIVE_PROFILE: "demo"
      CORS_ALLOWED_ORIGINS: "http://localhost:1235,http://localhost:5173,http://record-manager-statistics,${CORS_ALLOWED_ORIGINS_STATISTICS_SERVER:-}"

  # Expose MediaCMS on all interfaces for LAN access.
  # Transcoding is disabled to speed up development.
  mediacms:
    ports:
      - "0.0.0.0:${MEDIA_CMS_HOST_PORT:-2080}:80"
    environment:
      DEBUG: "True"
      DO_NOT_TRANSCODE_VIDEO: "True"
      DJANGO_ENV: "dev"

  migrations:
    environment:
      DEBUG: "True"
      DO_NOT_TRANSCODE_VIDEO: "True"
      DJANGO_ENV: "dev"

  # Celery workers are not needed in dev since transcoding is disabled.
  celery-worker:
    deploy:
      replicas: 0

  celery-beat:
    deploy:
      replicas: 0

  db-server:
    ports:
      - "7200:7200"

  record-manager-server:
    environment:
      LOGGING_LEVEL_ROOT: "DEBUG"
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB: "TRACE"
      security.cors.allowedOrigins: "http://localhost:4173,http://localhost:5173,http://record-manager,${CORS_ALLOWED_ORIGINS_RECORD_MANAGER_SERVER:-}"

  keycloak-config:
    environment:
      TF_VAR_dev_redirect_uris: '[
        "http://localhost:4173*",
        "http://localhost:5173*",
      ]'

      TF_VAR_dev_valid_post_logout_redirect_uris: '[
        "http://localhost:4173*",
        "http://localhost:5173*"
      ]'

      TF_VAR_dev_web_origins: '[
        "http://localhost:4173",
        "http://localhost:5173"
      ]'

      TF_VAR_test_user_username: "${TEST_USER_USERNAME:-test}"
      TF_VAR_test_user_password: "${TEST_USER_PASSWORD:-test}"
    volumes:
      - ./configs/keycloak-config:/workspace
      - ./configs/keycloak-config/dev:/workspace/dev
      - keycloak-secrets:/secrets
